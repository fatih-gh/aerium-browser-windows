name: Upstream watch

# Checks weekly whether ungoogled-chromium-windows has tagged a newer
# Chromium release than the one Aerium is built on, and opens a tracking
# issue when it does. Purely informational; never builds.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare upstream vs current
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ungoogled-software/ungoogled-chromium-windows
        run: |
          set -euo pipefail

          current="$(cat ungoogled-chromium/chromium_version.txt 2>/dev/null || echo unknown)"
          upstream_tag="$(gh api "repos/$UPSTREAM/tags?per_page=1" --jq '.[0].name')"
          # Tags look like 150.0.7871.114-1.1 -> take the Chromium part
          upstream_ver="${upstream_tag%%-*}"

          echo "current base: $current"
          echo "upstream tag: $upstream_tag (chromium $upstream_ver)"

          if [ "$upstream_ver" = "$current" ]; then
            echo "Up to date."
            exit 0
          fi

          title="Upstream update available: $upstream_tag"
          existing="$(gh issue list --state open --search "in:title Upstream update available" --json number --jq '.[0].number' || true)"
          body="$(printf 'Upstream **%s** tagged a newer Chromium.\n\n- Upstream tag: \`%s\` (Chromium \`%s\`)\n- Aerium base: \`%s\`\n\nSync steps are in [UPDATING.md](../blob/master/UPDATING.md).' "$UPSTREAM" "$upstream_tag" "$upstream_ver" "$current")"

          if [ -n "${existing:-}" ] && [ "$existing" != "null" ]; then
            gh issue edit "$existing" --title "$title" --body "$body"
            echo "Updated issue #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi
